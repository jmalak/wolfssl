# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: Open Watcom (CMake on multiple platforms)

on:
  push:
    branches: [ "ow-build" ]
  pull_request:
    branches: [ "ow-build" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        thread:
          - type:     'MT'
            cmake:    ''
          - type:     'ST'
            cmake:    '-D WOLFSSL_SINGLE_THREADED=yes'
        os:
          - host:     'Windows'
            id:       'Windows' 
            image:    'windows-latest'
            dirsep:   ';'
            owimage:  '2.0'
            cmake:    '-D WOLFSSL_ASM=no'
          - host:     'Windows'
            id:       'Windows' 
            image:    'windows-latest'
            dirsep:   ';'
            owimage:  '1.9'
            cmake:    '-D WOLFSSL_ASM=no'
          - host:     'Linux'
            id:       'Linux'
            image:    'ubuntu-latest'
            dirsep:   ':'
            owimage:  '2.0'
            cmake:    '-D WOLFSSL_ASM=no -D BUILD_SHARED_LIBS=no'
            # -D WOLFSSL_EXAMPLES=no -D WOLFSSL_CRYPT_TESTS=no
          - host:     'Windows'
            id:       'Linux'
            image:    'windows-latest'
            dirsep:   ';'
            owimage:  '2.0'
            cmake:    '-D WOLFSSL_ASM=no -D BUILD_SHARED_LIBS=no'
            # -D WOLFSSL_EXAMPLES=no -D WOLFSSL_CRYPT_TESTS=no
          - host:     'Windows'
            id:       'OS2' 
            image:    'windows-latest'
            dirsep:   ';'
            owimage:  '2.0'
            cmake:    '-D WOLFSSL_ASM=no'
    runs-on: ${{ matrix.os.image }}
    name: ${{ matrix.thread.type }} ${{ matrix.os.id }} by ${{ matrix.os.host }} OW ${{ matrix.os.owimage }}
    steps:
    - uses: actions/checkout@v4

    - name: Install Open Watcom
      uses: open-watcom/setup-watcom@v0
      with:
        version: ${{ matrix.os.owimage }}
    - name: Create build subdirectory
      run: mkdir build
    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only
      # required if you are using a single-configuration generator such as make.
      run: cmake -B build -G "Watcom WMake" -D CMAKE_VERBOSE_MAKEFILE=TRUE -D CMAKE_SYSTEM_NAME=${{ matrix.os.id }} -D CMAKE_SYSTEM_PROCESSOR=x86 -D CMAKE_BUILD_TYPE=Release ${{ matrix.os.cmake }} ${{ matrix.thread.cmake }}
    - name: Build
      run: cmake --build build
    - name: Tests Windows
      if: matrix.os.host == 'Windows' && matrix.os.id == 'Windows'
      working-directory: build/wolfcrypt/test
      run: |
        copy ${{github.workspace}}\build\wolfssl.dll .
        testwolfcrypt
      shell: cmd
    - name: Tests Linux
      if: matrix.os.host == 'Linux' && matrix.os.id == 'Linux'
      working-directory: build/wolfcrypt/test
      run: |
        ./testwolfcrypt
      shell: bash
    - name: Benchmark Windows
      if: matrix.os.host == 'Windows' && matrix.os.id == 'Windows'
      working-directory: build/wolfcrypt/benchmark
      run: |
        copy ${{github.workspace}}\build\wolfssl.dll .
        benchmark
      shell: cmd
    - name: Benchmark Linux
      if: matrix.os.host == 'Linux' && matrix.os.id == 'Linux'
      working-directory: build/wolfcrypt/benchmark
      run: |
        ./benchmark
      shell: bash
    - name: Upload build errors
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os.id }}-${{ matrix.os.host }}-${{ matrix.os.owimage }}-${{ matrix.thread.type }} 
        path: |
          build/**
